<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Fault Management System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        form {
            margin-bottom: 20px;
        }

        input, select {
            padding: 8px;
            margin: 5px;
            width: 160px;
        }

        button {
            padding: 8px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        .delete-btn {
            background-color: red;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 95%;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }

        /* Severity Colors */
        .critical {
            color: red;
            font-weight: bold;
        }

        .major {
            color: orange;
            font-weight: bold;
        }

        .minor {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>Fault Management System 🚀</h1>

<!-- ADD FAULT FORM -->
<form action="/add" method="post">
    <input type="text" name="alarmId" placeholder="Alarm ID" required>
    <input type="text" name="severity" placeholder="Severity (CRITICAL/MAJOR/MINOR)" required>
    <input type="text" name="description" placeholder="Description" required>

    <!-- DROPDOWN STATUS -->
    <select name="status" required>
        <option value="">Select Status</option>
        <option value="ACTIVE">ACTIVE</option>
        <option value="RESOLVED">RESOLVED</option>
        <option value="PENDING">PENDING</option>
    </select>

    <button type="submit">Add Fault</button>
</form>

<hr>

<h2>All Faults</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Alarm ID</th>
        <th>Severity</th>
        <th>Description</th>
        <th>Status</th>
        <th>Timestamp</th>
        <th>Update</th>
        <th>Delete</th>
    </tr>

    <tr th:each="f : ${faults}">
        <td th:text="${f.id}"></td>
        <td th:text="${f.alarmId}"></td>

        <!-- SEVERITY COLOR -->
        <td th:text="${f.severity}"
            th:classappend="${f.severity == 'CRITICAL'} ? 'critical' :
                            (${f.severity == 'MAJOR'} ? 'major' : 'minor')">
        </td>

        <td th:text="${f.description}"></td>
        <td th:text="${f.status}"></td>
        <td th:text="${f.timestamp}"></td>

        <!-- UPDATE STATUS -->
        <td>
            <form th:action="@{'/update/' + ${f.id}}" method="post">
                <select name="status" required>
                    <option value="ACTIVE">ACTIVE</option>
                    <option value="RESOLVED">RESOLVED</option>
                    <option value="PENDING">PENDING</option>
                </select>
                <button type="submit">Update</button>
            </form>
        </td>

        <!-- DELETE WITH CONFIRMATION -->
        <td>
            <form th:action="@{'/delete/' + ${f.id}}" method="post"
                  onsubmit="return confirm('Are you sure you want to delete this fault?');">
                <button type="submit" class="delete-btn">Delete</button>
            </form>
        </td>
    </tr>
</table>

</body>
</html>
